---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: checkmate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: brkdockerhub/node-repo:backend  
        env:
        - name: DB_HOST
          value: "mysql-service"
        - name: DB_USER
          value: "root"
        - name: DB_PASSWORD
          value: "rootpassword"
        - name: DB_NAME
          value: "checkmate"
        - name: JWT_SECRET
          value: "your_jwt_secret_here"
        - name: PORT
          value: "5000"
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: checkmate
spec:
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP     # internal only – frontend will access it via this name
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: checkmate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: brkdockerhub/node-repo:frontend
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: checkmate
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
  type: NodePort     # makes it accessible from outside the cluster
  # if you're on a cloud, use type: LoadBalancer instead
